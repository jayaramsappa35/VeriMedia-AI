name: VeriMedia AI — CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Test & Lint ─────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # non-blocking for hackathon

      - name: Test
        run: npm test

      - name: Check server starts
        run: |
          timeout 10 node backend/src/server.js &
          sleep 3
          curl -sf http://localhost:3000/api/health || (echo "Health check failed" && exit 1)
          kill %1 || true
        env:
          PORT: 3000
          NODE_ENV: test

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t verimedia-ai:${{ github.sha }} .

      - name: Test Docker health
        run: |
          docker run -d --name verimedia-test -p 3001:3000 verimedia-ai:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:3001/api/health
          docker stop verimedia-test

  # ── Deploy to Render (main branch) ──────────────────────────────────────────
  # Uncomment and configure if deploying to Render:
  # deploy:
